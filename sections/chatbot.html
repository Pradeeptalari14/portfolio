<!-- Chatbot Engine Script -->
<script>
(function() {
  const widget = document.getElementById('aiChatbotWidget');
  const toggleBtn = document.getElementById('chatToggleBtn');
  const chatWindow = document.getElementById('chatWindow');
  const closeBtn = document.getElementById('chatCloseBtn');
  const resetBtn = document.getElementById('chatResetBtn');
  const messagesBox = document.getElementById('chatMessages');
  const inputForm = document.getElementById('chatInputForm');
  const inputField = document.getElementById('chatInputField');
  const suggestionChips = document.querySelectorAll('.suggestion-chip');
  const chatFocusableEls = chatWindow.querySelectorAll('button, input');

  function setChatFocusable(focusable) {
    chatFocusableEls.forEach(el => {
      el.setAttribute('tabindex', focusable ? '0' : '-1');
    });
  }

  // Load state and toggle view
  toggleBtn.addEventListener('click', toggleChat);
  closeBtn.addEventListener('click', closeChat);
  if (resetBtn) {
    resetBtn.addEventListener('click', resetChat);
  }

  // Initialize focus state
  setChatFocusable(false);

  function toggleChat() {
    const isOpen = chatWindow.classList.toggle('open');
    chatWindow.setAttribute('aria-hidden', String(!isOpen));
    setChatFocusable(isOpen);
    if (isOpen) {
      // Clear alert badge
      const badge = toggleBtn.querySelector('.toggle-badge');
      if (badge) badge.style.display = 'none';
      
      // Auto-greeting
      if (messagesBox.children.length === 0) {
        addBotMessage("👋 Hello! I am your **TP. AI Platform Copilot** – specialized in AI Infrastructure, LLMOps pipelines, and cloud platform engineering.<br><br>Ask me about **Agentic OS**, **GraphRAG Platforms**, **AI Monitoring**, or select a suggestion chip below!");
      }
      setTimeout(() => inputField.focus(), 150);
    }
  }

  function closeChat() {
    chatWindow.classList.remove('open');
    chatWindow.setAttribute('aria-hidden', 'true');
    setChatFocusable(false);
  }

  function resetChat() {
    messagesBox.style.opacity = '0';
    messagesBox.style.transform = 'translateY(10px)';
    messagesBox.style.transition = 'all 0.25s ease';
    
    setTimeout(() => {
      messagesBox.innerHTML = '';
      messagesBox.style.opacity = '1';
      messagesBox.style.transform = 'translateY(0)';
      addBotMessage("👋 Session re-initialized! I am your **AI Platform Copilot** — ready to assist with your AI Infra & Platform queries.");
      scrollToBottom();
    }, 250);
  }

  // Handle suggestion chips
  suggestionChips.forEach(chip => {
    chip.addEventListener('click', () => {
      const query = chip.getAttribute('data-query');
      submitQuery(query);
    });
  });

  // Handle input submission
  inputForm.addEventListener('submit', (e) => {
    e.preventDefault();
    const query = inputField.value.trim();
    if (!query) return;
    submitQuery(query);
    inputField.value = '';
  });

  function submitQuery(query) {
    addUserMessage(query);
    scrollToBottom();

    // Trigger typing simulation
    const typingIndicator = addTypingIndicator();
    
    setTimeout(() => {
      typingIndicator.remove();
      const answer = generateAnswer(query);
      addBotMessage(answer);
      scrollToBottom();
    }, 500 + Math.random() * 500);
  }

  function addUserMessage(text) {
    const bubble = document.createElement('div');
    bubble.className = 'chat-bubble user';
    bubble.textContent = text;
    messagesBox.appendChild(bubble);
  }

  function addBotMessage(htmlContent) {
    const bubble = document.createElement('div');
    bubble.className = 'chat-bubble bot';
    bubble.innerHTML = htmlContent;
    messagesBox.appendChild(bubble);
  }

  function addTypingIndicator() {
    const bubble = document.createElement('div');
    bubble.className = 'chat-bubble bot typing-indicator';
    bubble.innerHTML = '<span>AI is analyzing telemetry...</span>';
    messagesBox.appendChild(bubble);
    return bubble;
  }

  function scrollToBottom() {
    messagesBox.scrollTop = messagesBox.scrollHeight;
  }

  const qaDatabase = [
    {
      keywords: ['pradeep', 'who is', 'profile', 'about', 'accenture', 'healthcare', 'resume', 'cv'],
      answer: "👤 **Talari Pradeep** is an **AI Infrastructure & Platform Engineer** at **Accenture** in Bangalore. At Accenture, he specializes in deploying secure, private AI models (like Mistral and Llama 3) on Kubernetes using Triton Inference Server and vLLM. This enabled bank-grade data privacy while cutting hosting costs by 40% through dynamic batching and INT4 quantization.<br><br>With 6+ years of IT operations experience, he builds scalable LLMOps pipelines (LangGraph, ArgoCD), vector databases (Weaviate, ChromaDB), and multi-cloud landing zones. You can view his skills under [Skills](/skills/) or view his projects under [Projects](/projects/)."

  function generateAnswer(query) {
    const q = query.toLowerCase();
    
    // Check for direct command strings
    const commandsFound = [];
    if (q.includes('df -h') || q.includes('free -m') || q.includes('uptime') || q.includes('top ')) {
      commandsFound.push("• `df -h` / `free -m` / `uptime` / `top`: Disk, Memory, and Load assessments. SREs check these to identify disk space shortages, swap leaks, or host execution overruns.");
    }
    if (q.includes('curl ') || q.includes('wget ')) {
      commandsFound.push("• `curl` / `wget`: Command-line tools to transfer data from or to a server. Commonly used in SRE to perform API calls, validate endpoint status, and pull configuration sheets.");
    }
    if (q.includes('ping') || q.includes('nslookup') || q.includes('dig') || q.includes('traceroute')) {
      commandsFound.push("• `ping` / `nslookup` / `dig` / `traceroute`: Core networking diagnostics. Used to resolve DNS records, verify latency, and locate routing path breaks between servers.");
    }
    if (q.includes('netstat') || q.includes('ss ') || q.includes('telnet')) {
      commandsFound.push("• `netstat` / `ss` / `telnet`: Socket verification commands. SREs run these to identify active socket ports, listen states, and verify if specific network interfaces are reachable.");
    }
    if (q.includes('ps ') || q.includes('kill ') || q.includes('top') || q.includes('htop')) {
      commandsFound.push("• `ps` / `kill` / `top` / `htop`: Processes management. Run to identify running processes, trace high CPU spikes, and terminate unresponsive jobs.");
    }
    if (q.includes('docker run') || q.includes('docker ps') || q.includes('docker build') || q.includes('docker exec') || q.includes('docker compose') || q.includes('docker-compose') || q.includes('docker images')) {
      commandsFound.push("• `docker` CLI: Used to build, run, and manage container instances. For example, `docker run` starts a container, `docker build` compiles a Dockerfile, and `docker-compose up` orchestrates multi-container workspaces. Scaffold container configurations at the **[Docker Manager](/tools/docker/)**!");
    }
    if (q.includes('kubectl ') || q === 'kubectl') {
      commandsFound.push("• `kubectl` CLI: The command-line utility for communicating with Kubernetes cluster API gateways. Common tasks include: `kubectl apply -f` to deploy manifests, `kubectl get pods` to view container statuses, and `kubectl logs` to pull container logs. Scaffold manifest resources at the **[k8s Script Generator](/tools/kubernetes/)**!");
    }
    if (q.includes('helm ') || q === 'helm') {
      commandsFound.push("• `helm` CLI: The package manager for Kubernetes resources. Common commands include `helm install` to deploy charts, `helm upgrade` to release updates, and `helm repo add` to index chart repositories. Scaffold charts at the **[Helm Chart Studio](/tools/helm/)**!");

      commandsFound.push("• `git` CLI: Distributed version control engine. Commonly used to manage codebase revisions, track modifications, and push changes to remote repositories (`git push`).");
    }
    if (q.includes('argocd ') || q === 'argocd') {
      commandsFound.push("• `argocd` CLI: Tool to manage declarative GitOps configurations. It synchronizes cluster states with Git code bases via `argocd app sync`. Scaffold GitOps components at the **[ArgoCD Studio](/tools/argocd/)**!");
    }
    if (q.includes('rate(') || q.includes('http_requests_total') || q.includes('sum(') || q.includes('by (') || q.includes('prometheus query') || q === 'promql') {
      commandsFound.push("• `PromQL` (Prometheus Query Language): Used to filter and analyze real-time SRE telemetry metrics. For example, `rate(...)` computes per-second alert thresholds over a historical window. Scaffold observability configurations at the **[Monitoring Telemetry](/tools/monitoring/)**!");
    }

    if (commandsFound.length > 0) {
      return "📈 **SRE Command Analyzer**: I parsed your command line! Here is a breakdown of what this health-check sequence performs:<br><br>" +
             commandsFound.join('<br><br>') + "<br><br>" +
             "💡 **Context**: Chaining commands with `&&` ensures that each command executes sequentially *only* if the previous one succeeded. This is a classic SRE diagnostic one-liner to check system storage, memory capacity, and CPU load at a glance. <br><br>" +
             "To generate custom monitoring scripts, try Pradeep's **[Shell Script Studio](/tools/shellscript/)** or the **[Linux Sysadmin Studio](/tools/linux/)**!";

    // Check for code explanation request or code structure
    const isCodeExpl = q.includes('explain') || q.includes('how to run') || q.includes('what does this code') || q.includes('code help') || q.includes('doubt') || q.includes('understand');
    const hasCodeIndicators = q.includes('dockerfile') || q.includes('yaml') || q.includes('apiversion') || q.includes('kubernetes manifest') || q.includes('def ') || q.includes('import ') || q.includes('playbook:') || q.includes('hosts:') || q.includes('tasks:') || q.includes('{') || q.includes('}') || q.includes('from ');
    
    if (isCodeExpl || hasCodeIndicators) {
      return "🧠 **SRE Code & Config Assistant**: I see you're asking about code or configurations! Here is a guide on how SRE teams evaluate, use, and run infrastructure-as-code:<br><br>" +
             "1. **Containerization (Dockerfiles)**: Ensure multi-stage builds are used to keep images small and secure. Run as a non-root user (UID 10001) and pin base images (e.g., `python:3.10-slim`). Build with: `docker build -t app:latest .` and test container health.<br><br>" +
             "2. **Orchestration (Kubernetes / Helm)**: Define resource limits (`cpu` and `memory` limits and requests) to protect clusters from out-of-memory crashes. Run with: `kubectl apply -f manifest.yaml`. Check deployment status using `kubectl rollout status deployment/name`.<br><br>" +
             "3. **Automation (Ansible / Playbooks)**: Use playbooks to automate setup tasks. Restrict privilege escalations (`become: true`) only to required steps. Execute with: `ansible-playbook -i hosts playbook.yml`. Verify inventory connections first using `ansible -m ping all`.<br><br>" +
             "4. **Infrastructure as Code (Terraform)**: Provision cloud resources declaratively. Always run dry-run validation checks first: `terraform plan` to preview changes, and then `terraform apply` to apply them. Use remote state backends (S3/DynamoDB) to avoid conflict state.<br><br>" +
             "💡 *Tip: If you're building a local RAG stack, use the [DevOps AI RAG Studio](/tools/ai/) to generate and immediately view/download complete backend, frontend, and deployment configurations with full explaining guides!*";
    }

    // Search for best matching response
    let bestMatch = null;
    let maxMatchCount = 0;

    for (const entry of qaDatabase) {
      let matchCount = 0;
      for (const keyword of entry.keywords) {
        if (q.includes(keyword)) {
          matchCount += keyword.length; // weight by length of keyword for precision
        }
      }
      if (matchCount > maxMatchCount) {
        maxMatchCount = matchCount;
        bestMatch = entry;
      }
    }

    if (bestMatch) {
      return bestMatch.answer;
    }

    // Smart general fallback: Try to extract SRE-like words to give a customized response

    for (let i = 0; i < localStorage.length; i++) {
      const key = localStorage.key(i);
      if (key.startsWith('sre_') || key.startsWith('tp-studio-')) {
        try {
          backupData[key] = JSON.parse(localStorage.getItem(key)) || localStorage.getItem(key);
        } catch(e) {
          backupData[key] = localStorage.getItem(key);
        }
      }
    }
    const blob = new Blob([JSON.stringify(backupData, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'sre_backup.json';
    a.click();
  }

  function importBackup(file) {
    const reader = new FileReader();
    reader.onload = function(e) {
      try {
        const data = JSON.parse(e.target.result);
        if (typeof data !== 'object' || data === null) {
          alert('Invalid backup file format.');
          return;
        }
        Object.entries(data).forEach(([key, val]) => {
          const stringVal = typeof val === 'object' ? JSON.stringify(val) : String(val);
          localStorage.setItem(key, stringVal);
        });
        alert('Backup restored successfully! Reloading portal...');
        window.location.reload();
      } catch (err) {
        alert('Error parsing backup file: ' + err.message);
      }
    };
    reader.readAsText(file);
  }

  // Theme override switcher
  function toggleGlobalTheme() {
    const isDark = document.documentElement.classList.toggle('dark-theme');
    localStorage.setItem('sre_dark_mode_active', isDark ? 'true' : 'false');
    applyGlobalTheme();
  }

  const $ = (id) => document.getElementById(id);

  function applyGlobalTheme() {
    const active = localStorage.getItem('sre_dark_mode_active') === 'true';
    if (active) {
      document.documentElement.classList.add('dark-theme');
      if (!document.getElementById('dark-theme-override-styles')) {
        const style = document.createElement('style');
        style.id = 'dark-theme-override-styles';
        style.textContent = `
          .dark-theme, .dark-theme body {
            background-color: #0f172a !important;
            color: #f8fafc !important;
          }
          .dark-theme :root {
            --bg-base:        #0f172a !important;
            --bg-surface:     #1e293b !important;
            --bg-card:        #1e293b !important;
            --bg-card-hover:  #1e2b4d !important;
            --text-primary:   #f8fafc !important;
            --text-secondary: #cbd5e1 !important;
            --text-muted:     #64748b !important;
            --border:         #334155 !important;
          }
          .dark-theme .navbar {
            background: rgba(15, 23, 42, 0.85) !important;
            border-bottom-color: #334155 !important;
          }
          .dark-theme .nav-link {
            color: #cbd5e1 !important;
          }
          .dark-theme .tool-card, .dark-theme .stats-card {
            background: #1e293b !important;
            border-color: #334155 !important;
          }
        `;
        document.head.appendChild(style);
      }
    } else {
      document.documentElement.classList.remove('dark-theme');
      const style = document.getElementById('dark-theme-override-styles');
      if (style) style.remove();
    }
  }

  // One-Click Code Copier
  function initCodeCopier() {
    const codeBlocks = document.querySelectorAll('pre');
    codeBlocks.forEach(block => {
      if (block.querySelector('.btn-copy-code') || block.id === 'output-box' || block.classList.contains('no-copy')) return;

      block.style.position = 'relative';
      const btn = document.createElement('button');
      btn.className = 'btn-copy-code no-print';
      btn.type = 'button';
      btn.style.cssText = `
        position: absolute;
        top: 8px;
        right: 8px;
        font-size: 10px;
        font-family: inherit;
        font-weight: bold;
        background: #1e293b;
        color: #cbd5e1;
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 4px;
        padding: 2px 6px;
        cursor: pointer;
        opacity: 0;
        transition: opacity 0.2s, background 0.2s;
        z-index: 10;
      `;
      btn.textContent = '📋 Copy';

      btn.onclick = () => {
        const codeElement = block.querySelector('code') || block;
        let textToCopy = codeElement.textContent;
        if (textToCopy.endsWith('\nCopy')) {
          textToCopy = textToCopy.substring(0, textToCopy.length - 5);
        }
        
        navigator.clipboard.writeText(textToCopy).then(() => {
          btn.textContent = '✅ Copied!';
          btn.style.background = '#10b981';
          btn.style.color = '#ffffff';
          setTimeout(() => {
            btn.textContent = '📋 Copy';
            btn.style.background = '#1e293b';
            btn.style.color = '#cbd5e1';
          }, 1500);
        });
      };

      block.addEventListener('mouseenter', () => {
        btn.style.opacity = '1';
      });
      block.addEventListener('mouseleave', () => {
        btn.style.opacity = '0';
      });

      block.appendChild(btn);
    });
  }

  // Bind settings cog trigger actions
  const btnOpenSettings = document.getElementById('btn-open-settings');
  if (btnOpenSettings) {
    btnOpenSettings.onclick = () => {
      const modal = document.getElementById('sre-backup-modal');
      if (modal) modal.style.display = 'flex';
    };
  }
  const btnCloseBackupModal = document.getElementById('btn-close-backup-modal');
  if (btnCloseBackupModal) {
    btnCloseBackupModal.onclick = () => {
      const modal = document.getElementById('sre-backup-modal');
      if (modal) modal.style.display = 'none';
    };
  }
  const btnToggleGlobalTheme = document.getElementById('btn-toggle-global-theme');
  if (btnToggleGlobalTheme) {
    btnToggleGlobalTheme.onclick = toggleGlobalTheme;
  }
  const btnExportBackup = document.getElementById('btn-export-backup');
  if (btnExportBackup) {
    btnExportBackup.onclick = exportBackup;
  }
  
  const triggerBtn = document.getElementById('btn-import-backup-trigger');
  const fileInput = document.getElementById('input-import-backup-file');
  if (triggerBtn && fileInput) {
    triggerBtn.onclick = () => fileInput.click();
    fileInput.onchange = (e) => {
      if (e.target.files.length > 0) {
        importBackup(e.target.files[0]);
      }
    };
  }

  const sreBackupModal = document.getElementById('sre-backup-modal');
  if (sreBackupModal) {
    sreBackupModal.onclick = (e) => {
      if (e.target === sreBackupModal) {
        sreBackupModal.style.display = 'none';
      }
    };
  }

  applyGlobalTheme();
  initCodeCopier();

  const observer = new MutationObserver(initCodeCopier);
  observer.observe(document.body, { childList: true, subtree: true });

  // Register Service Worker for offline capabilities
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js')
        .then((reg) => {
          console.log('Service Worker registered successfully with scope:', reg.scope);
        })
        .catch((err) => {
          console.warn('Service Worker registration failed:', err);
        });
    });
  }
})();
</script>
