  closeBtn.addEventListener('click', closeChat);

  function toggleChat() {
    const isOpen = chatWindow.classList.toggle('open');
    chatWindow.setAttribute('aria-hidden', String(!isOpen));
    if (isOpen) {
      // Clear alert badge
      const badge = toggleBtn.querySelector('.toggle-badge');
      if (badge) badge.style.display = 'none';
      
      // Auto-greeting
      if (messagesBox.children.length === 0) {

      }

    }
  }

  function closeChat() {
    chatWindow.classList.remove('open');
    chatWindow.setAttribute('aria-hidden', 'true');
  }

  // Handle suggestion chips
  suggestionChips.forEach(chip => {
    chip.addEventListener('click', () => {
      const query = chip.getAttribute('data-query');
      submitQuery(query);
    });
  });

  // Handle input submission

    e.preventDefault();
    const query = inputField.value.trim();
    if (!query) return;
    submitQuery(query);
    inputField.value = '';

  function submitQuery(query) {
    addUserMessage(query);

    const bubble = document.createElement('div');
    bubble.className = 'chat-bubble bot';
    bubble.innerHTML = htmlContent;
    messagesBox.appendChild(bubble);
  }

  function generateAnswer(query) {
    const q = query.toLowerCase().trim();
    
    // Check if query is a simple greeting
    if (q === 'hi' || q === 'hello' || q === 'hey' || q === 'yo' || q === 'greetings') {
      return "👋 Hello! I am **TP DevOps AI Partner** – a client-side SRE assistant. Ask me anything about Talari Pradeep's background, DevOps tools, or technical concepts (e.g. 'What is Kubernetes?', 'Tell me about RAG').";
    }

    // Check for SRE Shell Commands
    const commandsFound = [];
    if (q.includes('df ') || q.includes('df\n') || q.includes('df -') || q === 'df') {
      commandsFound.push("• `df` (Disk Free): Checks filesystem disk space usage. The `-h` flag prints size in human-readable gigabytes/megabytes, and `/` targets the root filesystem storage volume.");
    }
    if (q.includes('free ') || q.includes('free\n') || q.includes('free -') || q === 'free') {
      commandsFound.push("• `free` (Free Memory): Displays total, used, and available system RAM. The `-m` flag displays the statistics in megabytes (MB), and `-g` displays them in gigabytes (GB).");
    }
    if (q.includes('uptime')) {
      commandsFound.push("• `uptime`: Shows how long the server has been running, active user sessions count, and load averages over the last 1, 5, and 15 minutes (crucial for checking CPU congestion).");
    }
    if (q.includes('systemctl') || q.includes('service ')) {
      commandsFound.push("• `systemctl` / `service`: Used by sysadmins to manage systemd daemons (start, stop, enable, restart, and status checks of services like Nginx or Docker).");
    }
    if (q.includes('journalctl') || q.includes('tail ') || q.includes('cat ') || q.includes('grep ')) {
      commandsFound.push("• `journalctl` / `tail` / `cat` / `grep`: Standard utility tools for viewing, searching, and tailing system logs and application files to troubleshoot SRE runtime issues.");
    }
    if (q.includes('curl') || q.includes('wget')) {
      commandsFound.push("• `curl` / `wget`: Command-line tools to transfer data from or to a server. Commonly used in SRE to perform API calls, validate endpoint status, and pull configuration sheets.");
    }
    if (q.includes('ping') || q.includes('nslookup') || q.includes('dig') || q.includes('traceroute')) {
      commandsFound.push("• `ping` / `nslookup` / `dig` / `traceroute`: Core networking diagnostics. Used to resolve DNS records, verify latency, and locate routing path breaks between servers.");
    }
    if (q.includes('netstat') || q.includes('ss ') || q.includes('telnet')) {
      commandsFound.push("• `netstat` / `ss` / `telnet`: Socket verification commands. SREs run these to identify active socket ports, listen states, and verify if specific network interfaces are reachable.");
    }
    if (q.includes('ps ') || q.includes('kill ') || q.includes('top') || q.includes('htop')) {
