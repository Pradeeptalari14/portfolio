<!-- Chatbot Engine Script -->
<script>
(function() {
  const widget = document.getElementById('aiChatbotWidget');
  const toggleBtn = document.getElementById('chatToggleBtn');
  const chatWindow = document.getElementById('chatWindow');
  const closeBtn = document.getElementById('chatCloseBtn');
  const resetBtn = document.getElementById('chatResetBtn');
  const messagesBox = document.getElementById('chatMessages');
  const inputForm = document.getElementById('chatInputForm');
  const inputField = document.getElementById('chatInputField');
  const suggestionChips = document.querySelectorAll('.suggestion-chip');
  const chatFocusableEls = chatWindow.querySelectorAll('button, input');

  function setChatFocusable(focusable) {
    chatFocusableEls.forEach(el => {
      el.setAttribute('tabindex', focusable ? '0' : '-1');
    });
  }

  // Load state and toggle view
  toggleBtn.addEventListener('click', toggleChat);
  closeBtn.addEventListener('click', closeChat);
  if (resetBtn) {
    resetBtn.addEventListener('click', resetChat);
  }

  // Initialize focus state
  setChatFocusable(false);

  function toggleChat() {
    const isOpen = chatWindow.classList.toggle('open');
    chatWindow.setAttribute('aria-hidden', String(!isOpen));
    setChatFocusable(isOpen);
    if (isOpen) {
      // Clear alert badge
      const badge = toggleBtn.querySelector('.toggle-badge');
      if (badge) badge.style.display = 'none';
      
      // Auto-greeting
      if (messagesBox.children.length === 0) {
        addBotMessage("👋 Hello SRE Engineer! I am **TP DevOps AI Partner** – a futuristic, localized agent specialized in cloud operations, DevOps architectures, and SRE tools.<br><br>Ask me about **DevOps workflow loops**, **SRE reliability runbooks**, **AI/MLOps pipelines**, or click the suggestion chips below to query specific details!");
      }
      setTimeout(() => inputField.focus(), 150);
    }
  }

  function closeChat() {
    chatWindow.classList.remove('open');
    chatWindow.setAttribute('aria-hidden', 'true');
    setChatFocusable(false);
  }

  function resetChat() {
    messagesBox.style.opacity = '0';
    messagesBox.style.transform = 'translateY(10px)';
    messagesBox.style.transition = 'all 0.25s ease';
    
    setTimeout(() => {
      messagesBox.innerHTML = '';
      messagesBox.style.opacity = '1';
      messagesBox.style.transform = 'translateY(0)';
      addBotMessage("👋 Cyber Session re-initialized! I am **TP DevOps AI Partner** – SRE digital agent active.<br><br>Ask me about **DevOps workflow loops**, **SRE reliability runbooks**, or **AI/MLOps pipelines**!");
      scrollToBottom();
    }, 250);
  }

  // Handle suggestion chips
  suggestionChips.forEach(chip => {
    chip.addEventListener('click', () => {
      const query = chip.getAttribute('data-query');
      submitQuery(query);
    });
  });

  // Handle input submission
  inputForm.addEventListener('submit', (e) => {
    e.preventDefault();
    const query = inputField.value.trim();
    if (!query) return;
    submitQuery(query);
    inputField.value = '';
  });

  function submitQuery(query) {
    addUserMessage(query);
    scrollToBottom();

    // Trigger typing simulation
    const typingIndicator = addTypingIndicator();
    
    setTimeout(() => {
      typingIndicator.remove();
      const answer = generateAnswer(query);
      addBotMessage(answer);
      scrollToBottom();
    }, 500 + Math.random() * 500);
  }

  function addUserMessage(text) {
    const bubble = document.createElement('div');
    bubble.className = 'chat-bubble user';
    bubble.textContent = text;
    messagesBox.appendChild(bubble);
  }

  function addBotMessage(htmlContent) {
    const bubble = document.createElement('div');
    bubble.className = 'chat-bubble bot';
    bubble.innerHTML = htmlContent;
    messagesBox.appendChild(bubble);
  }

  function addTypingIndicator() {
    const bubble = document.createElement('div');
    bubble.className = 'chat-bubble bot typing-indicator';
    bubble.innerHTML = '<span>AI is analyzing telemetry...</span>';
    messagesBox.appendChild(bubble);
    return bubble;
  }

  function scrollToBottom() {
    messagesBox.scrollTop = messagesBox.scrollHeight;
  }

  const qaDatabase = [
    {
      keywords: ['pradeep', 'who is', 'profile', 'about', 'accenture', 'healthcare', 'resume', 'cv'],
      answer: "👤 **Talari Pradeep** is a DevOps & Cloud Engineer specializing in AWS, Kubernetes, Terraform, and CI/CD operations. He has experience working on enterprise healthcare projects at Accenture. You can view his skills under [Skills](/skills/) or view his projects under [Projects](/projects/)."
    },
    {
      keywords: ['devops', 'development', 'operations', 'cicd', 'deployment flow'],
      answer: "⚡ **DevOps (Development & Operations)** is a software engineering methodology that integrates development and operations teams to automate the build, test, scan, and release cycle.<br><br>" +
              "• **Where it is used**: In the portfolio, DevOps principles guide target delivery pipelines (declarative Jenkinsfiles, GitLab CI, and GitHub Actions) to compile code and roll out containerized services.<br>" +
              "• **What tools are used**: Jenkins, GitHub Actions, GitLab CI/CD, and Docker.<br>" +
              "• **How it helps**: By orchestrating automated stages (such as SonarQube static analysis, Trivy vulnerability audits, and ECR packaging), DevOps slashes build-to-release latency, guarantees build stability, and secures deployment flows."
    },
    {
      keywords: ['sre', 'site reliability', 'reliability', 'slo', 'sli', 'error budget', 'uptime', 'health check'],
      answer: "🛡️ **SRE (Site Reliability Engineering)** is a discipline that applies software engineering practices to infrastructure operations to build highly reliable, scalable, and self-healing systems.<br><br>" +
              "• **Where it is used**: SRE techniques are configured across monitoring telemetry dashboards, centralized logging systems, and incident response automation modules.<br>" +
              "• **What tools are used**: Prometheus, Grafana, Alertmanager, Loki, ELK Stack, Ansible, and Shell/Bash scripting.<br>" +
              "• **How it helps**: SRE defines concrete Service Level Objectives (SLOs), triggers instant Slack alerts on disk/memory shortages, parses stack logs dynamically, and invokes self-healing playbooks (e.g. purging host caches) to eliminate production downtime."
    },
    {
      keywords: ['ai', 'artificial intelligence', 'mlops', 'rag', 'llm', 'slm', 'agent', 'vector db', 'ollama', 'chroma'],
      answer: "🧠 **AI & MLOps** represents the integration of machine learning pipelines, autonomous agents, and Large Language Models (LLMs) with standard DevOps operations.<br><br>" +
              "• **Where it is used**: Detailed inside Pradeep's MLOps initiatives:<ul>" +
              "<li>**[DevOps AI RAG Studio](/tools/ai/)**: Queries private documentation files using ChromaDB vector database and local embeddings.</li>" +
              "<li>**[K8s Troubleshooting Agent](/tools/kubernetes/)**: Diagnoses pod CrashLoopBackOffs using LLM analysis.</li>" +
              "<li>**[MLflow Tracking Studio](/tools/mlflow/)**: Registers model weights and tracks runs.</li>" +
              "<li>**[Strands SRE Agent](/tools/strands/)**: Visualizes autonomous agentic loops.</li>" +
              "<li>**[Enterprise LLM Studio](/tools/llm/)**: Provisions vLLM/Triton GPU scaling pipelines.</li>" +
              "<li>**[SLM Local Studio](/tools/slm/)**: Generates local Ollama Modelfiles.</li>" +
              "</ul>" +
              "• **How it helps**: AI automates root-cause checks on application log streams, audits Terraform deployment files for scale policies, and designs diagnostic shell templates in real-time."
    },
    {
      keywords: ['studios', 'studios list', 'all tools', 'generator', 'launchers', 'categories'],
      answer: "🛠️ **Interactive Automation Studios**: Pradeep has designed 77+ specialized studios categorized under `/tools/` to automate DevOps workflows:<br><br>" +
              "• **AI & MLOps**: [Enterprise LLM Studio](/tools/llm/), [Local SLM Studio](/tools/slm/), [MLflow Tracking](/tools/mlflow/), [Strands SRE Agent](/tools/strands/), [DevOps AI RAG](/tools/ai/) for configuring models.<br>" +
              "• **Cloud & Orchestration**: [k8s Script Generator](/tools/kubernetes/), [Helm Chart Studio](/tools/helm/), [ArgoCD GitOps](/tools/argocd/), [Terraform Architect](/tools/terraform/), [Service Mesh](/tools/mesh/) for cluster operations.<br>" +
              "• **CI/CD Pipelines**: [GitHub Actions](/tools/github-actions/), [GitLab CI/CD](/tools/gitlab/), [Jenkins Shared Library](/tools/jenkins/) for automating builds.<br>" +
