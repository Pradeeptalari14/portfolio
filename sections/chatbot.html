</div>

<!-- Chatbot Engine Script -->
<script>
(function() {
  const widget = document.getElementById('aiChatbotWidget');
  const toggleBtn = document.getElementById('chatToggleBtn');
  const chatWindow = document.getElementById('chatWindow');
  const closeBtn = document.getElementById('chatCloseBtn');
  const messagesBox = document.getElementById('chatMessages');
  const inputForm = document.getElementById('chatInputForm');
  const inputField = document.getElementById('chatInputField');
  const suggestionChips = document.querySelectorAll('.suggestion-chip');

  // Load state and toggle view
  toggleBtn.addEventListener('click', toggleChat);
  closeBtn.addEventListener('click', closeChat);

  function toggleChat() {
    const isOpen = chatWindow.classList.toggle('open');
    chatWindow.setAttribute('aria-hidden', String(!isOpen));
    if (isOpen) {
      // Clear alert badge
      const badge = toggleBtn.querySelector('.toggle-badge');
      if (badge) badge.style.display = 'none';
      
      // Auto-greeting
      if (messagesBox.children.length === 0) {
        addBotMessage("👋 Hello SRE Engineer! I am **TP DevOps AI Partner** – a localized agent specialized in cloud operations, DevOps architectures, and SRE tools.<br><br>Ask me anything about Talari Pradeep's skills, qualifications, or click the chips below to test my automation launchers!");
      }
      setTimeout(() => inputField.focus(), 150);
    }
  }

  function closeChat() {
    chatWindow.classList.remove('open');
    chatWindow.setAttribute('aria-hidden', 'true');
  }

  // Handle suggestion chips
  suggestionChips.forEach(chip => {
    chip.addEventListener('click', () => {
      const query = chip.getAttribute('data-query');
      submitQuery(query);
    });
  });

  // Handle input submission
  inputForm.addEventListener('submit', (e) => {
    e.preventDefault();
    const query = inputField.value.trim();
    if (!query) return;
    submitQuery(query);
    inputField.value = '';
  });

  function submitQuery(query) {
    addUserMessage(query);
    
    // Scroll to bottom
    scrollToBottom();

    // Trigger typing simulation
    const typingIndicator = addTypingIndicator();
    
    setTimeout(() => {
      // Remove typing indicator
      typingIndicator.remove();
      
      // Process response
      const answer = generateAnswer(query);
      addBotMessage(answer);
      scrollToBottom();
    }, 600 + Math.random() * 600);
  }

  function addUserMessage(text) {
    const bubble = document.createElement('div');
    bubble.className = 'chat-bubble user';
    bubble.textContent = text;
    messagesBox.appendChild(bubble);
  }

  function addBotMessage(htmlContent) {
    const bubble = document.createElement('div');
    bubble.className = 'chat-bubble bot';
    bubble.innerHTML = htmlContent;
    messagesBox.appendChild(bubble);
  }

  function addTypingIndicator() {
    const bubble = document.createElement('div');
    bubble.className = 'chat-bubble bot typing-indicator';
    bubble.innerHTML = '<span style="opacity:0.6;font-style:italic;">AI is analyzing metrics...</span>';
    messagesBox.appendChild(bubble);
    return bubble;
  }

  function scrollToBottom() {
    messagesBox.scrollTop = messagesBox.scrollHeight;
  }

  /* ═══════════════════════════════════════════════
     CLIENT-SIDE AI EXPERT MATCHING ENGINE
     ═══════════════════════════════════════════════ */
  const qaDatabase = [
    {
      keywords: ['pradeep', 'who is', 'profile', 'about', 'accenture', 'sutter', 'resume', 'cv'],
      answer: "👤 **Talari Pradeep** is a DevOps & Cloud Engineer specializing in AWS, Kubernetes, Terraform, and CI/CD operations. He has enterprise experience on the Sutter Health project at Accenture. You can view his skills under [Skills](/skills/) or check out his qualifications at [Credentials](/certifications/)."
    },
    {
      keywords: ['rag', 'ai', 'llm', 'vector', 'embedding', 'ollama', 'chroma', 'nomic', 'llama', 'qwen', 'retrieval'],
      answer: "🤖 **DevOps AI RAG (Retrieval-Augmented Generation)**: RAG combines document search with local Large Language Models (LLMs) to answer technical questions using your private infrastructure manuals.<br><br>Try Pradeep's **[DevOps AI RAG Studio](/tools/ai/)** to customize and generate Streamlit chat clients, FastAPI gateways, LangChain retrieval pipelines, Docker compose, and Kubernetes configurations!"
    },
    {
      keywords: ['tool', 'generator', 'scripts', 'list', 'studio', 'studios'],
      answer: "🛠️ Pradeep has designed 15 interactive automation studios:<ul>" +
             "<li>[Ansible Playbook Builder](/tools/ansible/)</li>" +
             "<li>[Docker Manager](/tools/docker/)</li>" +
             "<li>[Terraform Architect](/tools/terraform/)</li>" +
             "<li>[k8s Script Generator](/tools/kubernetes/)</li>" +
             "<li>[Monitoring Telemetry](/tools/monitoring/)</li>" +
             "<li>[DevOps AI RAG Studio](/tools/ai/)</li>" +
             "</ul>Click any of them to launch the tool!"
    },
    {
      keywords: ['kubernetes', 'k8s', 'kube', 'kubectl', 'pod', 'deployment', 'cluster', 'orchestration', 'ingress', 'replica'],
      answer: "⚓ **Kubernetes (K8s)**: An open-source container orchestration platform for automating deployment, scaling, and management of containerized applications. Pradeep is a **Certified Kubernetes Administrator (CKA)** and experienced in setting up EKS, Helm charts, ingress controllers, and network policies. You can generate custom manifests at the [Kubernetes Studio](/tools/kubernetes/)!"
    },
    {
      keywords: ['terraform', 'iac', 'infrastructure as code', 'terraform associate', 'hcl'],
      answer: "🔧 **Terraform (IaC)**: An open-source Infrastructure as Code tool by HashiCorp used to define and provision cloud resources safely using declarative configuration files (HCL). Pradeep is a **HashiCorp Certified Terraform Associate** and builds automated, dry-run templates for AWS environments. Scaffold your IaC using the [Terraform Architect Studio](/tools/terraform/)!"
    },
    {
      keywords: ['ansible', 'playbook', 'yaml', 'inventory', 'configuration management', 'adhoc'],
      answer: "🤖 **Ansible**: An agentless IT automation tool used for configuration management, application deployment, and task automation. Pradeep uses Ansible to automate server provisioning and application deployments. Check out the [Ansible Playbook Builder](/tools/ansible/) to generate playbooks and inventories!"
    },
    {
      keywords: ['prometheus', 'grafana', 'monitor', 'alert', 'observability', 'metrics', 'telemetry'],
      answer: "📈 **Observability (Prometheus & Grafana)**: Prometheus is an open-source monitoring and alerting toolkit that collects metrics as time-series data. Grafana is a visualization platform that maps these metrics into real-time dashboards. Pradeep builds robust telemetry systems to ensure 99.9% uptime. Configure yours at the [Monitoring Telemetry Studio](/tools/monitoring/)!"
    },
    {
      keywords: ['ci/cd', 'pipeline', 'github actions', 'gitlab', 'jenkins', 'automation pipeline', 'continuous integration'],
      answer: "⚡ **CI/CD (Continuous Integration / Continuous Delivery)**: Automates the process of building, testing, scanning, and deploying code. Pradeep designs secure pipelines containing static analysis (SonarQube) and container vulnerability scanning (Trivy). Try his pipeline builders:<ul><li>[GitHub Actions Studio](/tools/github-actions/)</li><li>[GitLab CI/CD Studio](/tools/gitlab/)</li><li>[Jenkins Pipeline Studio](/tools/jenkins/)</li></ul>"
    },
    {
      keywords: ['cert', 'credential', 'certification', 'achievement', 'qualification', 'cka', 'aws cert'],
      answer: "🎓 **Pradeep's Certifications**:<ul><li>AWS Certified DevOps Engineer – Professional</li><li>Certified Kubernetes Administrator (CKA)</li><li>AWS Certified Solutions Architect – Associate</li><li>HashiCorp Certified Terraform Associate</li><li>Linux Foundation Certified System Administrator (LFCS)</li></ul>Check out the credentials at [/certifications/](/certifications/)!"
    },
    {
      keywords: ['contact', 'hire', 'email', 'phone', 'linkedin', 'reach'],
      answer: "📧 **Contact Talari Pradeep**: You can email him at [talaripradeep45@gmail.com](mailto:talaripradeep45@gmail.com) or connect on [LinkedIn](https://linkedin.com/in/pradeep-talari). He is currently available for DevOps/SRE roles!"
    },
    {
      keywords: ['skills', 'tech', 'stack', 'languages', 'python', 'bash', 'go', 'shell'],
      answer: "🚀 **Core Tech Stack**: AWS, Google Cloud, Azure, Kubernetes (EKS), Docker, Helm, ArgoCD, Terraform, Ansible, Prometheus, Grafana, GitHub Actions, Jenkins, Python, Bash/Shell, and Go. Details are on the [Skills Page](/skills/)."
    },
    {
      keywords: ['devops', 'sre', 'site reliability', 'operations', 'devops engineer', 'reliability'],
      answer: "💡 **DevOps & Site Reliability Engineering (SRE)**: DevOps is a cultural and technical movement bridging development and operations. SRE is a specific implementation of DevOps created by Google, applying software engineering practices to infrastructure operations. Pradeep specializes in automating these practices using CI/CD, Infrastructure as Code, Kubernetes, and comprehensive monitoring."
    },
    {
      keywords: ['argocd', 'gitops', 'git ops', 'continuous deployment'],
      answer: "🐙 **ArgoCD (GitOps)**: A declarative, GitOps continuous delivery tool for Kubernetes. It monitors Git repositories for manifest changes and automatically synchronizes them with target clusters. Pradeep implements ArgoCD for automated deployments. Scaffold GitOps configurations at the [ArgoCD Studio](/tools/argocd/)!"
    },
    {
      keywords: ['helm', 'chart', 'helm chart'],
      answer: "⚓ **Helm**: The package manager for Kubernetes. Helm uses 'charts' to define, install, and upgrade even the most complex Kubernetes applications. Pradeep builds Helm charts to parameterize microservices. Scaffold Helm files at the [Helm Chart Studio](/tools/helm/)!"
    },
    {
      keywords: ['logging', 'log', 'elk', 'loki', 'fluentd', 'elasticsearch', 'kibana'],
      answer: "🪵 **Centralized Logging**: Tools like the ELK stack (Elasticsearch, Logstash, Kibana) or Grafana Loki aggregate logs across microservices to enable rapid SRE troubleshooting. Pradeep sets up structured logging configurations. Scaffold yours at the [Logging Studio](/tools/logging/)!"
    },
    {
      keywords: ['linux', 'bash', 'shell', 'script', 'ubuntu', 'redhat', 'centos', 'kernel', 'unix', 'cron'],
      answer: "🐧 **Linux & Scripting**: Pradeep is a **Linux Foundation Certified System Administrator (LFCS)** and writes automated Bash/Shell scripts for cron jobs, log rotations, and system backups. Try his scripting generators:<ul><li>[Linux Sysadmin Studio](/tools/linux/)</li><li>[Shell Script Studio](/tools/shellscript/)</li></ul>"
    },
    {
      keywords: ['python', 'pip', 'fastapi', 'flask', 'django'],
      answer: "🐍 **Python**: Used heavily in SRE for automation, custom metrics collection, and AI/RAG backend engines (like FastAPI). Pradeep designs clean Python utilities. Scaffold production scripts at the [Python Studio](/tools/python/)!"
    },
    {
      keywords: ['aws', 'amazon', 'cloud', 'gcp', 'azure', 'vpc', 's3', 'ec2', 'iam', 'route53'],
      answer: "☁️ **Cloud Infrastructure (AWS/GCP/Azure)**: Pradeep is an **AWS Certified Solutions Architect** and **AWS Certified DevOps Engineer – Professional**. He configures secure VPCs, IAM policies, auto-scaling groups, and load balancers to ensure cloud reliability."
    },
    {
      keywords: ['git', 'github', 'version control', 'repo', 'repository'],
      answer: "🐙 **Git & Version Control**: Git is essential for version control and collaborating on codebase deployments. Pradeep implements trunk-based development and branch protection rules. Configure GitHub actions at the [GitHub Actions Studio](/tools/github-actions/)."
    }
  ];

  function generateAnswer(query) {
    const q = query.toLowerCase().trim();
    
    // Check if query is a simple greeting
    if (q === 'hi' || q === 'hello' || q === 'hey' || q === 'yo' || q === 'greetings') {
      return "👋 Hello! I am **TP DevOps AI Partner** – a client-side SRE assistant. Ask me anything about Talari Pradeep's background, DevOps tools, or technical concepts (e.g. 'What is Kubernetes?', 'Tell me about RAG').";
    }

    // Search for best matching response
    let bestMatch = null;
    let maxMatchCount = 0;

    for (const entry of qaDatabase) {
      let matchCount = 0;
      for (const keyword of entry.keywords) {
        if (q.includes(keyword)) {
          matchCount += keyword.length; // weight by length of keyword for precision
        }
      }
      if (matchCount > maxMatchCount) {
        maxMatchCount = matchCount;
        bestMatch = entry;
      }
    }

    if (bestMatch) {
      return bestMatch.answer;
    }

    // Smart general fallback: Try to extract SRE-like words to give a customized response
    const words = q.split(/[^a-zA-Z0-9]/).filter(w => w.length > 2);
    const techWords = words.map(w => `*${w}*`).join(', ');
    
    return `🧠 **SRE Intelligent Assistant**: I analyzed your query keywords: ${techWords || 'your query'}.<br><br>` +
           `While I don't have a direct answer pre-loaded for this exact phrase, you can ask about **Kubernetes**, **Terraform**, **Docker**, **Ansible**, **CI/CD**, or **RAG AI**. <br><br>` +
           `Feel free to check out Pradeep's work under the [Skills](/skills/) page, his [Projects](/projects/), or email him directly at [talaripradeep45@gmail.com](mailto:talaripradeep45@gmail.com).`;
  }

})();
</script>
