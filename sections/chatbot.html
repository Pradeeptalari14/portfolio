  toggleBtn.addEventListener('click', toggleChat);
  closeBtn.addEventListener('click', closeChat);

  function toggleChat() {
    const isOpen = chatWindow.classList.toggle('open');
    chatWindow.setAttribute('aria-hidden', String(!isOpen));
    if (isOpen) {
      // Clear alert badge
      const badge = toggleBtn.querySelector('.toggle-badge');
      if (badge) badge.style.display = 'none';
      
      // Auto-greeting
      if (messagesBox.children.length === 0) {
        addBotMessage("👋 Hello SRE Engineer! I am **TP DevOps AI Partner** – a localized agent specialized in cloud operations, DevOps architectures, and SRE tools.<br><br>Ask me anything about Talari Pradeep's skills, qualifications, or click the chips below to test my automation launchers!");
      }
      setTimeout(() => inputField.focus(), 150);
    }
  }

  function closeChat() {
    chatWindow.classList.remove('open');
    chatWindow.setAttribute('aria-hidden', 'true');
  }

  // Handle suggestion chips
  suggestionChips.forEach(chip => {
    chip.addEventListener('click', () => {
      const query = chip.getAttribute('data-query');
      submitQuery(query);
    });
  });

  // Handle input submission
  inputForm.addEventListener('submit', (e) => {
    e.preventDefault();
    const query = inputField.value.trim();
    if (!query) return;
    submitQuery(query);
    inputField.value = '';
  });

  function submitQuery(query) {
    addUserMessage(query);
    
    // Scroll to bottom

      // Remove typing indicator

      scrollToBottom();

    bubble.textContent = text;
    messagesBox.appendChild(bubble);
  }

    const bubble = document.createElement('div');
    bubble.className = 'chat-bubble bot';
    bubble.innerHTML = htmlContent;
    messagesBox.appendChild(bubble);
  }

    bubble.innerHTML = '<span style="opacity:0.6;font-style:italic;">AI is analyzing metrics...</span>';
