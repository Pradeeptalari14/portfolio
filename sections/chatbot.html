<!-- ══ AI PORTFOLIO CHATBOT WIDGET ══ -->
<div class="ai-chatbot-widget" id="aiChatbotWidget">
  
  <!-- Pulsing Chat Toggle Button -->
  <button class="chat-toggle-btn" id="chatToggleBtn" aria-label="Open AI Assistant">
    <div class="toggle-pulse"></div>
    <span class="toggle-icon">🤖</span>
    <span class="toggle-badge">AI</span>
  </button>

  <!-- Chat Window -->
  <div class="chat-window" id="chatWindow" aria-hidden="true">
    
    <!-- Window Header -->
    <div class="chat-header">
      <div class="chat-header-info">
        <div class="chat-avatar">🤖</div>
        <div>
          <h4 class="chat-title">TP. DevOps AI Partner</h4>
          <p class="chat-status"><span class="status-dot"></span> Online SRE Assistant</p>
        </div>
      </div>
      <button class="chat-close-btn" id="chatCloseBtn" aria-label="Close Chat">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <!-- Messages Container -->
    <div class="chat-messages" id="chatMessages">
      <!-- Injected dynamically -->
    </div>

    <!-- Suggestions Panel -->
    <div class="chat-suggestions" id="chatSuggestions">
      <button class="suggestion-chip" data-query="Who is Pradeep?">👤 About Pradeep</button>
      <button class="suggestion-chip" data-query="List all SRE Tools">🛠️ List SRE Tools</button>
      <button class="suggestion-chip" data-query="What is AI RAG Studio?">🤖 Explain AI RAG</button>
      <button class="suggestion-chip" data-query="What credentials do you hold?">🎓 Certifications</button>
      <button class="suggestion-chip" data-query="How can I contact you?">📧 Get in Touch</button>
    </div>

    <!-- Input Bar -->
    <form class="chat-input-area" id="chatInputForm">
      <input type="text" id="chatInputField" placeholder="Ask about DevOps, AI, or Pradeep's tools..." required autocomplete="off" />
      <button type="submit" class="chat-send-btn" aria-label="Send message">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </form>

  </div>
</div>

<!-- Chatbot Specific Styles (Scoped) -->

    bottom: 30px;
    right: 30px;
    z-index: 1000;
    font-family: 'Inter', system-ui, sans-serif;
  }

  /* Toggle button with pulse glow */
  .chat-toggle-btn {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: linear-gradient(135deg, #4f46e5 0%, #0ea5e9 100%);
    border: none;
    color: #ffffff;
    font-size: 1.6rem;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(79, 70, 229, 0.4);
    position: relative;
    transition: transform 0.22s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .chat-toggle-btn:hover {
    transform: scale(1.08);
  }

  .toggle-pulse {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    border-radius: 50%;

    top: -4px;
    right: -4px;
    background: #ef4444;
    color: white;

    font-weight: 800;
    padding: 0.15rem 0.4rem;
    border-radius: 50px;
    border: 2px solid #ffffff;
    letter-spacing: 0.05em;
  }

  /* Chat window structure */
  .chat-window {
    width: 380px;
    height: 520px;
    background: rgba(255, 255, 255, 0.95);
    border: 1px solid rgba(226, 232, 240, 0.8);
    border-radius: var(--radius-lg);
    box-shadow: 0 12px 40px rgba(15, 23, 42, 0.12);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    position: absolute;
    bottom: 80px;
    right: 0;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    opacity: 0;
    transform: translateY(20px) scale(0.95);

  /* Header details */
  .chat-header {
    background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);

    color: white;

    justify-content: space-between;
  }

  .chat-header-info {
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .chat-avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.1);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.15rem;
  }

  .chat-title {
    font-family: 'Space Grotesk', sans-serif;

  }

  .chat-status {

  }

  .status-dot {
    width: 6px;

    background: #10b981;

  }

  .chat-close-btn {
    background: none;
    border: none;
    color: #94a3b8;
    cursor: pointer;

  }

  .chat-close-btn:hover {
    color: white;

  .chat-close-btn svg {
    width: 16px;

  /* Message streams */
  .chat-messages {
    flex: 1;
    padding: 1.25rem;

  .chat-bubble.bot {

  .chat-suggestions {

  .chat-send-btn svg {

  .chat-bubble a {

  }

  .chat-bubble ul, .chat-bubble ol {
    margin-top: 0.4rem;
    padding-left: 1.1rem;
  }

    margin-bottom: 0.2rem;
  }

  @media (max-width: 480px) {
    .ai-chatbot-widget {

<!-- Chatbot Engine Script -->
<script>
(function() {
  const widget = document.getElementById('aiChatbotWidget');
  const toggleBtn = document.getElementById('chatToggleBtn');
  const chatWindow = document.getElementById('chatWindow');
  const closeBtn = document.getElementById('chatCloseBtn');
  const messagesBox = document.getElementById('chatMessages');
  const inputForm = document.getElementById('chatInputForm');
  const inputField = document.getElementById('chatInputField');
  const suggestionChips = document.querySelectorAll('.suggestion-chip');

  // Load state and toggle view
  toggleBtn.addEventListener('click', toggleChat);
  closeBtn.addEventListener('click', closeChat);

  function toggleChat() {
    const isOpen = chatWindow.classList.toggle('open');
    chatWindow.setAttribute('aria-hidden', String(!isOpen));
    if (isOpen) {
      // Clear alert badge
      const badge = toggleBtn.querySelector('.toggle-badge');
      if (badge) badge.style.display = 'none';
      
      // Auto-greeting
      if (messagesBox.children.length === 0) {
        addBotMessage("👋 Hello SRE Engineer! I am **TP DevOps AI Partner** – a localized agent specialized in cloud operations, DevOps architectures, and SRE tools.<br><br>Ask me anything about Talari Pradeep's skills, qualifications, or click the chips below to test my automation launchers!");
      }
      setTimeout(() => inputField.focus(), 150);
    }
  }

  function closeChat() {
    chatWindow.classList.remove('open');
    chatWindow.setAttribute('aria-hidden', 'true');
  }

  // Handle suggestion chips
  suggestionChips.forEach(chip => {
    chip.addEventListener('click', () => {
      const query = chip.getAttribute('data-query');
      submitQuery(query);
    });
  });

  // Handle input submission
  inputForm.addEventListener('submit', (e) => {
    e.preventDefault();
    const query = inputField.value.trim();
    if (!query) return;
    submitQuery(query);
    inputField.value = '';
  });

  function submitQuery(query) {
    addUserMessage(query);
    
    // Scroll to bottom
    scrollToBottom();

    // Trigger typing simulation
    const typingIndicator = addTypingIndicator();
    
    setTimeout(() => {
      // Remove typing indicator
      typingIndicator.remove();
      
      // Process response
      const answer = generateAnswer(query);
      addBotMessage(answer);
      scrollToBottom();
    }, 600 + Math.random() * 600);
  }

  function addUserMessage(text) {
    const bubble = document.createElement('div');
    bubble.className = 'chat-bubble user';
    bubble.textContent = text;
    messagesBox.appendChild(bubble);
  }

  function addBotMessage(htmlContent) {
    const bubble = document.createElement('div');
    bubble.className = 'chat-bubble bot';
    bubble.innerHTML = htmlContent;
    messagesBox.appendChild(bubble);
  }

  function addTypingIndicator() {
    const bubble = document.createElement('div');
    bubble.className = 'chat-bubble bot typing-indicator';
    bubble.innerHTML = '<span style="opacity:0.6;font-style:italic;">AI is analyzing metrics...</span>';
    messagesBox.appendChild(bubble);
    return bubble;
  }

  function scrollToBottom() {
    messagesBox.scrollTop = messagesBox.scrollHeight;
  }

  /* ═══════════════════════════════════════════════
     CLIENT-SIDE AI EXPERT MATCHING ENGINE
     ═══════════════════════════════════════════════ */
  function generateAnswer(query) {
    const q = query.toLowerCase();

    // 1. About / Talari Pradeep
    if (q.includes('pradeep') || q.includes('who is') || q.includes('about') || q.includes('profile')) {
      return "👤 **Talari Pradeep** is a DevOps & Cloud Engineer specializing in AWS, Kubernetes, Terraform, and CI/CD operations. He has enterprise experience on the Sutter Health project at Accenture. You can view his skills under [Skills](/skills/) or check out his qualifications at [Credentials](/certifications/).";
    }

    // 2. AI RAG Studio & general RAG/AI questions
    if (q.includes('rag') || q.includes('ai') || q.includes('llm') || q.includes('vector') || q.includes('embedding')) {
      return "🤖 **DevOps AI RAG (Retrieval-Augmented Generation)**: RAG combines document search with local Large Language Models (LLMs) to answer technical questions using your private infrastructure manuals.<br><br>Try Pradeep's **[DevOps AI RAG Studio](/tools/ai/)** to customize and generate Streamlit chat clients, FastAPI gateways, LangChain retrieval pipelines, Docker compose, and Kubernetes configurations!";
    }

    // 3. All tools
    if (q.includes('tool') || q.includes('generator') || q.includes('scripts') || q.includes('list')) {
      return "🛠️ Pradeep has designed 15 interactive automation studios:<ul>" +
             "<li>[Ansible Playbook Builder](/tools/ansible/)</li>" +
             "<li>[Docker Manager](/tools/docker/)</li>" +
             "<li>[Terraform Architect](/tools/terraform/)</li>" +
             "<li>[k8s Script Generator](/tools/kubernetes/)</li>" +
             "<li>[Monitoring Telemetry](/tools/monitoring/)</li>" +
             "<li>[DevOps AI RAG Studio](/tools/ai/)</li>" +
             "</ul>Click any of them to launch the tool!";
    }

    // 4. Kubernetes
    if (q.includes('kubernetes') || q.includes('k8s') || q.includes('orchestrat')) {
      return "⚓ **Kubernetes (k8s)** is one of Pradeep's core strengths! He holds the **Certified Kubernetes Administrator (CKA)** credential. Try his interactive manifest utility at [k8s Script Generator](/tools/kubernetes/).";
    }

    // 5. Terraform
    if (q.includes('terraform') || q.includes('iac') || q.includes('infrastructure as code')) {
      return "🔧 **Terraform**: Used for provisioning clean multi-tier VPCs, DBs, and EKS nodes. Check out Pradeep's [Terraform Architect](/tools/terraform/) tool to scaffold dry-run HCL files!";
    }

    // 6. Ansible
    if (q.includes('ansible') || q.includes('playbook') || q.includes('automation')) {
      return "🤖 **Ansible**: Great for configuration management and patch runs. Scaffold roles, task recipes, and custom inventory setups using Pradeep's [Ansible Playbook Builder](/tools/ansible/).";
    }

    // 7. Monitoring / Prometheus / Grafana
    if (q.includes('monitor') || q.includes('prometheus') || q.includes('grafana') || q.includes('alert')) {
      return "📈 **Observability**: Prometheus collects SRE metrics, and Grafana maps them into dashboards. Scaffold systemd scripts at [Monitoring Generator](/tools/monitoring/).";
    }

    // 8. CI/CD / GitHub / GitLab / Jenkins
    if (q.includes('ci/cd') || q.includes('pipeline') || q.includes('actions') || q.includes('jenkins') || q.includes('gitlab')) {
      return "⚡ **CI/CD Pipelines**: Automate code compilation, testing, Trivy scans, and pushes. Try:<ul>" +
             "<li>[GitHub Actions Studio](/tools/github-actions/)</li>" +
             "<li>[GitLab CI/CD Studio](/tools/gitlab/)</li>" +
             "<li>[Jenkins Pipeline Generator](/tools/jenkins/)</li>" +
             "</ul>";
    }

    // 9. Certifications
    if (q.includes('cert') || q.includes('credential') || q.includes('achievement') || q.includes('qualification')) {
      return "🎓 **Credentials & Achievements**: Pradeep holds 5 major industry validations:<ul>" +
             "<li>**AWS Solutions Architect – Associate**</li>" +
             "<li>**Certified Kubernetes Administrator (CKA)**</li>" +
             "<li>**HashiCorp Terraform Associate**</li>" +
             "<li>**AWS DevOps Engineer – Professional**</li>" +
             "<li>**Linux Foundation Certified SysAdmin**</li>" +
             "</ul>Read details at [/certifications/](/certifications/).";
    }

    // 10. Contact / Email / LinkedIn
    if (q.includes('contact') || q.includes('hire') || q.includes('email') || q.includes('phone') || q.includes('reach')) {
      return "📧 **Connect**: You can write to Pradeep directly at [talaripradeep45@gmail.com](mailto:talaripradeep45@gmail.com) or visit his [LinkedIn Profile](https://linkedin.com/in/pradeep-talari). He is open to DevOps, SRE, and Cloud contracts.";
    }

    // 11. Skills
    if (q.includes('skills') || q.includes('stack') || q.includes('languages') || q.includes('python')) {
      return "🚀 **Core Tech Stack**: AWS, Google Cloud, Azure, Kubernetes (EKS), Docker, Helm, ArgoCD, Terraform, Ansible, Prometheus, Grafana, GitHub Actions, Jenkins, Python, Bash/Shell, and Go.";
    }

    // 12. General DevOps SRE Questions
    if (q.includes('devops') || q.includes('sre')) {
      return "💡 **DevOps & SRE**: DevOps bridges software development and system operations, while Site Reliability Engineering (SRE) applies software engineering principles to operations to build highly reliable, automated cloud infrastructures. Pradeep specializes in implementing these via CI/CD, IaC, and Kubernetes! View his dashboard at [/tools/](/tools/).";
    }

    // 13. General RAG details
    if (q.includes('what is rag') || q.includes('retrieval augmented')) {
      return "💡 **Retrieval-Augmented Generation (RAG)**: RAG combines document search with LLMs. It splits your local manuals into chunks, saves them as embeddings in databases, retrieves relative context, and passes it to the LLM to get accurate answers.";
    }

    // Fallback
    return "🧠 **SRE Intelligent Assistant**: I am currently running client-side on your static site. I can guide you to all portfolio sections and tools.<br><br>Try asking: *'Who is Pradeep?'*, *'List all SRE Tools'*, *'What credentials do you hold?'*, or *'How does AI RAG Studio work?'*";
  }

})();
</script>
