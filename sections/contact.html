<!-- ══ CONTACT ══ -->
  <section class="section section-alt" id="contact">
    <div class="container">
      <div class="section-header">
        <span class="section-tag">Contact</span>
        <h2 class="section-title">Let's <span class="gradient-text">Connect</span></h2>
        <p class="section-subtitle">Open to full-time roles, freelance contracts, and interesting collaborations. Drop me a message!</p>
      </div>
      <div class="contact-grid">

        <form class="contact-form" id="contactForm">
          <div class="form-row">
            <div class="form-group">
              <label for="contactName">Your Name</label>
              <input type="text" id="contactName" name="name" placeholder="John Doe" required />
            </div>
            <div class="form-group">
              <label for="contactEmail">Email Address</label>
              <input type="email" id="contactEmail" name="email" placeholder="john@company.com" required />
            </div>
          </div>
          <div class="form-group">
            <label for="contactSubject">Subject</label>
            <input type="text" id="contactSubject" name="subject" placeholder="Job opportunity / Collaboration / Question" />
          </div>
          <div class="form-group">
            <label for="contactMessage">Message</label>
            <textarea id="contactMessage" name="message" rows="5" placeholder="Tell me about your project, role, or how I can help..." required></textarea>
          </div>
          <button type="submit" class="btn-primary full-width" id="submit-form-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            Send Message
          </button>
          <div class="form-success" id="formSuccess" style="display:none">
            ✅ Message sent! I'll get back to you within 24 hours.
          </div>
          <div class="form-error" id="formError" style="display:none">
            ❌ Something went wrong. Please email me directly at <a href="mailto:talaripradeep45@gmail.com">talaripradeep45@gmail.com</a>
          </div>
        </form>
      </div>
    </div>
  </section>
