name: Production Security Audits

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * 1' # Run weekly on Mondays

permissions:
  contents: read
  security-events: write

jobs:
  secret_scan:
    name: Secrets & Credentials Leak Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
        with:
          fetch-depth: 0

      - name: Gitleaks Secret Detector Scan
        uses: gitleaks/gitleaks-action@30b4e1837604a11f271f28b4383188d3e2bdfc83 # v2.3.7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency_scan:
    name: Dependency Vulnerability Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - name: Setup Node.js
        uses: actions/setup-node@601291d996c6b7704b397f4a50b66bc28a11eb46 # v4.0.3
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Audit NPM Dependencies
        run: npm audit --audit-level=high

  static_analysis:
    name: Static Code Analysis & Config Linter
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - name: Run Trivy Vulnerability Scanner (IaC Configs Check)
        uses: aquasecurity/trivy-action@8513284201a4db4e803c00234a9d701026027a3c # v0.36.0
        with:
          scan-type: 'config'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'
